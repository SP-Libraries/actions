name: Code Quality

on:
  workflow_call:
    inputs:
      VERBOSE:
        type: boolean
        default: false
        required: false
        description: 'Enable verbose output'
    secrets:
      GH_TOKEN:
        required: true
        description: 'GitHub token for authentication'

jobs:
  detect-languages:
    runs-on: ubuntu-latest
    outputs:
      run_php: ${{ steps.detect.outputs.run_php }}
      run_node: ${{ steps.detect.outputs.run_node }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect languages
        id: detect
        shell: bash
        run: |
          run_php=false
          run_node=false

          # Force if inputs are set
          if [ -f "composer.json" ]; then
            run_php=true
          fi

          if [ -f "package.json" ]; then
            run_node=true
          fi

          echo "run_php=$run_php" >> $GITHUB_OUTPUT
          echo "run_node=$run_node" >> $GITHUB_OUTPUT

          echo "Detected RUN_PHP=$run_php, RUN_NODE=$run_node"

  code-quality:
    needs: detect-languages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - language: php
            php: 8.2
            node: ''
          - language: php
            php: 8.3
            node: ''
          - language: node
            php: ''
            node: 20
          - language: node
            php: ''
            node: 21

    steps:
      - name: Show Inputs
        if: ${{ inputs.VERBOSE }}
        run: |
          echo "VERBOSE: ${{ inputs.VERBOSE }}"
          echo "RUN_PHP (final): ${{ needs.detect-languages.outputs.run_php }}"
          echo "RUN_NODE (final): ${{ needs.detect-languages.outputs.run_node }}"

      - name: Setup Environment
        if: >
          (matrix.language == 'php' && needs.detect-languages.outputs.run_php == 'true') ||
          (matrix.language == 'node' && needs.detect-languages.outputs.run_node == 'true')
        uses: SP-Libraries/actions/.github/actions/setup-environment@main
        with:
          FETCH_DEPTH: 0
          SETUP_PHP: ${{ matrix.language == 'php' }}
          SETUP_NODE: ${{ matrix.language == 'node' }}
          INSTALL_DEPENDENCIES: true
          INSTALL_DEV_DEPENDENCIES: true
          PHP_VERSION: ${{ matrix.php }}
          NODE_VERSION: ${{ matrix.node }}
          VERBOSE: ${{ inputs.VERBOSE }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Run LintRC
        if: >
          (matrix.language == 'php' && needs.detect-languages.outputs.run_php == 'true') ||
          (matrix.language == 'node' && needs.detect-languages.outputs.run_node == 'true')
        run: npx @sp-packages/lintrc ${{ inputs.VERBOSE && '--verbose' || '' }}
