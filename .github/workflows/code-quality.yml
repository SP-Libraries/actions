name: Code Quality

on:
  workflow_call:
    inputs:
      VERBOSE:
        type: boolean
        default: false
        required: false
        description: 'Enable verbose output'
    secrets:
      GH_TOKEN:
        required: true
        description: 'GitHub token for authentication'

jobs:
  detect-languages:
    runs-on: ubuntu-latest
    outputs:
      run_php: ${{ steps.detect.outputs.run_php }}
      run_node: ${{ steps.detect.outputs.run_node }}
      run_both: ${{ steps.detect.outputs.run_both }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect languages
        id: detect
        shell: bash
        run: |
          run_php=false
          run_node=false
          run_both=false

          if [ -f "composer.json" ]; then
            run_php=true
          fi

          if [ -f "package.json" ]; then
            run_node=true
          fi

          if [ "$run_php" = "true" ] && [ "$run_node" = "true" ]; then
            run_both=true
          fi

          echo "run_php=$run_php"   >> $GITHUB_OUTPUT
          echo "run_node=$run_node" >> $GITHUB_OUTPUT
          echo "run_both=$run_both" >> $GITHUB_OUTPUT

          echo "Detected RUN_PHP=$run_php, RUN_NODE=$run_node, RUN_BOTH=$run_both"

  code-quality:
    needs: detect-languages
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - language: php
            php: 8.2
          - language: php
            php: 8.3
          - language: node
            node: 20
          - language: node
            node: 21
          - language: php-node
            php: 8.2
            node: 20
          - language: php-node
            php: 8.3
            node: 20

    steps:
      - name: Show Inputs
        if: ${{ inputs.VERBOSE }}
        run: |
          echo "VERBOSE: ${{ inputs.VERBOSE }}"
          echo "RUN_PHP:  ${{ needs.detect-languages.outputs.run_php }}"
          echo "RUN_NODE: ${{ needs.detect-languages.outputs.run_node }}"
          echo "RUN_BOTH: ${{ needs.detect-languages.outputs.run_both }}"

      - name: Setup Environment
        if: >
          (matrix.language == 'php'      && needs.detect-languages.outputs.run_php == 'true'   && needs.detect-languages.outputs.run_both == 'false') ||
          (matrix.language == 'node'     && needs.detect-languages.outputs.run_node == 'true'  && needs.detect-languages.outputs.run_both == 'false') ||
          (matrix.language == 'php-node' && needs.detect-languages.outputs.run_both == 'true')
        uses: SP-Libraries/actions/.github/actions/setup-environment@main
        with:
          FETCH_DEPTH: 0
          SETUP_PHP: ${{ matrix.language == 'php' || matrix.language == 'php-node' }}
          SETUP_NODE: ${{ matrix.language == 'node' || matrix.language == 'php-node' }}
          INSTALL_DEPENDENCIES: true
          INSTALL_DEV_DEPENDENCIES: true
          PHP_VERSION: ${{ matrix.php }}
          NODE_VERSION: ${{ matrix.node }}
          VERBOSE: ${{ inputs.VERBOSE }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Run LintRC
        if: >
          (matrix.language == 'php'      && needs.detect-languages.outputs.run_php == 'true'   && needs.detect-languages.outputs.run_both == 'false') ||
          (matrix.language == 'node'     && needs.detect-languages.outputs.run_node == 'true'  && needs.detect-languages.outputs.run_both == 'false') ||
          (matrix.language == 'php-node' && needs.detect-languages.outputs.run_both == 'true')
        run: npx @sp-packages/lintrc ${{ inputs.VERBOSE && '--verbose' || '' }}
